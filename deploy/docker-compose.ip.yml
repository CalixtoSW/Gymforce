version: "3.9"

# Compose para teste com IP direto (sem SSL/certbot)
# Uso: docker compose -f deploy/docker-compose.ip.yml --env-file deploy/.env.prod up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: gymforce-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gymforce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymforce-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - gymforce-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gymforce-api
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gymforce-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://5.189.162.52/api/v1
    container_name: gymforce-admin
    restart: always
    networks:
      - gymforce-net

  mobile:
    build:
      context: ../mobile
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_BASE_URL: http://5.189.162.52/api/v1
    container_name: gymforce-mobile
    restart: always
    networks:
      - gymforce-net

  nginx:
    image: nginx:1.27-alpine
    container_name: gymforce-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/gymforce-ip.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
      - mobile
    networks:
      - gymforce-net

volumes:
  pgdata:
  redisdata:

networks:
  gymforce-net:
    driver: bridge
